name: Release

# Publishes ocwi-loader to npm on a v* tag. The loader bakes a default ocwi-core
# version into dist/loader.js at build time (build.mjs reads OCWI_CORE_VERSION or
# package.json `ocwiLoader.coreVersion`).
#
# Release flow:
#   1. bump package.json `version`
#   2. set `ocwiLoader.coreVersion` to the published ocwi-core to pin (or leave
#      "latest"); commit
#   3. push tag v<version>
#
# Prerequisites (set by a repo admin, not by CI):
#   - NPM_TOKEN secret: an npm granular token with read/write package access
#     and Bypass 2FA enabled for ocwi-loader.
# Tag-only: never runs on a branch push, so merging it does not publish anything.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Test (default 'latest' build + loader behaviour)
        run: npm test

      - name: Resolve ocwi-core version to bake in
        id: core
        run: |
          CV="$(node -p "require('./package.json').ocwiLoader.coreVersion")"
          echo "version=$CV" >> "$GITHUB_OUTPUT"
          echo "Baking ocwi-core@$CV into the loader"

      - name: Build loader with the resolved core version
        run: npm run build
        env:
          OCWI_CORE_VERSION: ${{ steps.core.outputs.version }}

      - name: Assert built loader references the intended core version
        run: |
          CV="${{ steps.core.outputs.version }}"
          if ! grep -q "ocwi-core@${CV}" dist/loader.js; then
            echo "::error::dist/loader.js does not reference ocwi-core@${CV}"
            exit 1
          fi
          echo "dist/loader.js references ocwi-core@${CV}"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
