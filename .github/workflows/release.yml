name: Release

# Publishes ocwi-loader to npm on a v* tag. The loader bakes a default ocwi-core
# version into dist/loader.js at build time (build.mjs reads OCWI_CORE_VERSION or
# package.json `ocwiLoader.coreVersion`).
#
# Release flow:
#   1. bump package.json `version`
#   2. pin the core: set `ocwiLoader.coreVersion` to the published ocwi-core and
#      `ocwiLoader.coreSri` to its sha384 Subresource Integrity hash (derive it
#      with: curl -fsSL <coreUrl> | openssl dgst -sha384 -binary | openssl base64
#      -A, then prefix "sha384-"). Leaving "latest" ships the mutable opt-in with
#      no SRI. The build FAILS if an exact version is set without a matching SRI.
#   3. push tag v<version>
#
# Prerequisites (set by a repo admin, not by CI):
#   - NPM_TOKEN secret: an npm granular token with read/write package access
#     and Bypass 2FA enabled for ocwi-loader.
# Tag-only: never runs on a branch push, so merging it does not publish anything.

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Test (default 'latest' build + loader behaviour)
        run: npm test

      - name: Resolve ocwi-core version + SRI to bake in
        id: core
        run: |
          CV="$(node -p "require('./package.json').ocwiLoader.coreVersion")"
          SRI="$(node -p "require('./package.json').ocwiLoader.coreSri || ''")"
          echo "version=$CV" >> "$GITHUB_OUTPUT"
          echo "sri=$SRI" >> "$GITHUB_OUTPUT"
          echo "Baking ocwi-core@$CV${SRI:+ with SRI $SRI} into the loader"

      - name: Build loader with the resolved core version
        run: npm run build
        env:
          OCWI_CORE_VERSION: ${{ steps.core.outputs.version }}
          OCWI_CORE_SRI: ${{ steps.core.outputs.sri }}

      - name: Assert built loader references the intended core version and SRI
        run: |
          CV="${{ steps.core.outputs.version }}"
          SRI="${{ steps.core.outputs.sri }}"
          if ! grep -q "ocwi-core@${CV}" dist/loader.js; then
            echo "::error::dist/loader.js does not reference ocwi-core@${CV}"
            exit 1
          fi
          echo "dist/loader.js references ocwi-core@${CV}"
          if [ -n "$SRI" ]; then
            if ! grep -qF "$SRI" dist/loader.js; then
              echo "::error::dist/loader.js does not embed the pinned SRI $SRI"
              exit 1
            fi
            echo "dist/loader.js embeds the pinned SRI"
          fi

      # No provenance/attestation is emitted: this token-based publish sets no
      # `--provenance` and grants no `id-token: write`. Real supply-chain
      # provenance needs npm trusted publishing, tracked by #8.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
