<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OCWI Loader Latest Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1c2430;
        background: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: grid;
        gap: 10px;
        margin-bottom: 24px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(28px, 4vw, 44px);
        line-height: 1.08;
        font-weight: 760;
      }

      h2 {
        font-size: 18px;
        line-height: 1.3;
      }

      p {
        max-width: 720px;
        color: #526071;
        line-height: 1.55;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 20px;
        align-items: start;
      }

      .panel,
      .widget-shell {
        border: 1px solid #d8e0ea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 14px 36px rgba(32, 46, 66, 0.08);
      }

      .widget-shell {
        min-height: 620px;
        overflow: hidden;
      }

      #ocwi-demo {
        min-height: 620px;
      }

      .empty-state {
        display: grid;
        min-height: 620px;
        place-items: center;
        padding: 32px;
        text-align: center;
        border: 1px dashed #b9c6d6;
        background:
          linear-gradient(135deg, rgba(41, 121, 255, 0.08), transparent 38%),
          linear-gradient(315deg, rgba(0, 151, 136, 0.1), transparent 42%),
          #ffffff;
      }

      .empty-state strong {
        display: block;
        margin-bottom: 8px;
        font-size: 20px;
      }

      .side {
        display: grid;
        gap: 16px;
      }

      .panel {
        padding: 18px;
      }

      form {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #303b49;
        font-size: 13px;
        font-weight: 650;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 1px solid #b9c6d6;
        border-radius: 6px;
        padding: 10px 12px;
        color: #1c2430;
        font: inherit;
        line-height: 1.35;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        color: #ffffff;
        background: #1764d8;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible {
        outline: 3px solid rgba(23, 100, 216, 0.24);
        outline-offset: 2px;
      }

      dl {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr);
        gap: 10px 12px;
        margin: 14px 0 0;
        font-size: 13px;
      }

      dt {
        color: #637184;
      }

      dd {
        min-width: 0;
        margin: 0;
        overflow-wrap: anywhere;
        color: #1f2b3a;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }

      .status {
        min-height: 24px;
        margin-top: 12px;
        color: #526071;
        font-size: 13px;
      }

      @media (max-width: 880px) {
        main {
          width: min(100vw - 24px, 680px);
          padding: 20px 0;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .side {
          order: -1;
        }

        dl {
          grid-template-columns: 96px minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>OCWI Latest Loader Demo</h1>
        <p>
          This page loads the local loader from <code>../dist/loader.js</code>. The loader
          resolves <code>ocwi-core@latest</code> from the configured CDN by default.
        </p>
      </header>

      <div class="layout">
        <section class="widget-shell" aria-label="OCWI widget">
          <div id="ocwi-demo">
            <div class="empty-state" id="empty-state">
              <div>
                <strong>OCWI mount target</strong>
                <p>Provide a public Luma config URL to mount the widget here.</p>
              </div>
            </div>
          </div>
        </section>

        <aside class="side" aria-label="Demo controls">
          <section class="panel">
            <h2>Mount config</h2>
            <form id="ocwi-demo-form">
              <label>
                Luma config URL
                <input
                  id="luma-url"
                  name="lumaUrl"
                  type="url"
                  placeholder="https://luma.amca.cz/api/v1/config/public-hash/"
                  autocomplete="off"
                >
              </label>
              <button type="submit">Mount OCWI</button>
            </form>
            <p class="status" id="mount-status" role="status"></p>
          </section>

          <section class="panel">
            <h2>Loader diagnostics</h2>
            <dl id="loader-diagnostics"></dl>
          </section>
        </aside>
      </div>
    </main>

    <script src="../dist/loader.js"></script>
    <script>
      (function () {
        'use strict';

        var params = new URLSearchParams(window.location.search);
        var form = document.getElementById('ocwi-demo-form');
        var input = document.getElementById('luma-url');
        var status = document.getElementById('mount-status');
        var diagnostics = document.getElementById('loader-diagnostics');
        var emptyState = document.getElementById('empty-state');
        var handle = null;

        input.value = params.get('lumaUrl') || '';
        renderDiagnostics();
        window.setTimeout(renderDiagnostics, 0);

        if (input.value) {
          mountOcwi(input.value);
        }

        form.addEventListener('submit', function (event) {
          event.preventDefault();
          mountOcwi(input.value);
        });

        function mountOcwi(lumaUrl) {
          var normalizedUrl = String(lumaUrl || '').trim();

          if (!normalizedUrl) {
            status.textContent = 'Enter a Luma config URL before mounting.';
            return;
          }

          if (typeof window.OCWI !== 'function') {
            status.textContent = 'window.OCWI is not available yet.';
            renderDiagnostics();
            return;
          }

          if (handle && typeof handle.destroy === 'function') {
            handle.destroy();
          }

          if (emptyState) {
            emptyState.remove();
            emptyState = null;
          }

          status.textContent = 'Mounting OCWI...';
          handle = window.OCWI('#ocwi-demo', {
            api: {
              lumaUrl: normalizedUrl,
            },
          });
          window.ocwiDemoHandle = handle;

          if (handle && handle.ready && typeof handle.ready.then === 'function') {
            handle.ready.then(
              function () {
                status.textContent = 'OCWI mounted.';
                renderDiagnostics();
              },
              function (error) {
                status.textContent = error && error.message ? error.message : 'OCWI mount failed.';
                renderDiagnostics();
              }
            );
            return;
          }

          status.textContent = 'OCWI mount call finished.';
          renderDiagnostics();
        }

        function renderDiagnostics() {
          var meta = window.OCWI_LOADER || {};
          var rows = [
            ['loader', meta.loaderVersion || 'n/a'],
            ['package', meta.corePackage || 'n/a'],
            ['version', meta.coreVersion || 'n/a'],
            ['mode', meta.mode || 'n/a'],
            ['loaded', String(Boolean(meta.loaded))],
            ['coreUrl', meta.coreUrl || 'n/a'],
          ];

          diagnostics.textContent = '';
          rows.forEach(function (row) {
            var term = document.createElement('dt');
            var detail = document.createElement('dd');
            term.textContent = row[0];
            detail.textContent = row[1];
            diagnostics.append(term, detail);
          });
        }
      })();
    </script>
  </body>
</html>
